# Severity HIGH — supercritical racing front (M2.4, HUMAN-LOCKED).
# Provenance: severity_lock.md (2026-07-19, owner + RA decision record);
#   beta_c_hat = 0.500 +/- 0.005 (R_L crossing family; self-duality
#   R(beta_c) ~ 1/2 at all L). Beta chosen: 0.70 — leaves headroom below
#   v_hat = 1 so escape is possible in principle (fronts at 83% of agent
#   speed — outrunnable, barely). ~98% of the arena eventually burns: High
#   is an evacuation-while-foraging regime by construction.
# Measured at L=64, 512 seeds (calibration.npz sha256 c131ba72ecd6e27c...,
#   calibration_crossing.npz sha256 74acb17addec78be...):
#   v_hat = 0.83 cells/step, P_span = 0.998, mean burnt fraction = 98.3%
#   -> spec band High: v_hat in [0.5, 1.0] cells/step  SATISFIED.
# Training protocol otherwise identical to phase1_accept.yaml (M1.5
# operating point); M2.5 overrides death_penalty via --death-penalty.
env:
  grid_size: 64
  n_agents: 12
  horizon: 256
  obs_window: 9
  n_food: 32

theta:
  beta: 0.70
  # Coupling A + structure — M3.4 HUMAN-LOCKED 2026-07-21
  # (coupling_a_lock.md, joint w/ RA; calibration m34/
  # coupling_a_calibration.json, candidate 2). Random-policy targets met
  # at Low+Medium: collapses/ep 8.5, seeded/ep 4.47, deaths_collapse
  # 0.180, Low seeded-burnt share 0.763. r_seed=1 / weak_smooth=2 are the
  # config defaults, locked as-is.
  kappa_A: 0.06
  lambda_0: 5.0e-5
  lambda_load: 4.0e-4
  f_weak: 0.15
  kappa_B: 0.0
  delta: 0.0
  death_penalty: 0.0
  iota: 0.0
  sigma_s: 1.0
  eta: 0.5

train:
  n_envs: 256
  rollout_len: 128
  n_minibatches: 4
  n_epochs: 4
  ckpt_interval: 50
