# Severity LOW — subcritical hazard (M2.4, HUMAN-LOCKED).
# Provenance: severity_lock.md (2026-07-19, owner + RA decision record);
#   beta_c_hat = 0.500 +/- 0.005 (R_L crossing family; self-duality
#   R(beta_c) ~ 1/2 at all L). Beta chosen: 0.43.
# Measured at L=64, 512 seeds (calibration.npz sha256 c131ba72ecd6e27c...,
#   calibration_crossing.npz sha256 74acb17addec78be...):
#   P_span = 0.021, mean burnt fraction = 1.9%
#   -> spec band Low: P_span < 0.05 AND bf in [1, 5]%  SATISFIED.
# Note: the Phase-1 placeholder beta = 0.35 fails this band (bf 0.34% < 1%).
# Training protocol otherwise identical to phase1_accept.yaml (M1.5
# operating point); M2.5 overrides death_penalty via --death-penalty.
env:
  grid_size: 64
  n_agents: 12
  horizon: 256
  obs_window: 9
  n_food: 32

theta:
  beta: 0.43
  kappa_A: 0.0
  kappa_B: 0.0
  delta: 0.0
  death_penalty: 0.0
  iota: 0.0
  sigma_s: 1.0
  eta: 0.5

train:
  n_envs: 256
  rollout_len: 128
  n_minibatches: 4
  n_epochs: 4
  ckpt_interval: 50
